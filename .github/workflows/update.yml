name: update-card-tracker

on:
  schedule:
    # elk uur op het halve uur (UTC)
    - cron: "30 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main, claude/**]
    paths:
      - "src/**"
      - "config/**"
      - ".github/workflows/update.yml"

permissions:
  contents: write

concurrency:
  group: update-card-tracker
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tracker
        run: python -m src.tracker
      - name: Commit changes
        run: |
          git config user.name "card-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "Geen wijzigingen om te committen."
            exit 0
          fi
          git commit -m "chore(tracker): update snapshot $(date -u +%FT%TZ)"
          for i in 1 2 3 4; do
            if git push; then exit 0; fi
            sleep $((2 ** i))
          done
          exit 1

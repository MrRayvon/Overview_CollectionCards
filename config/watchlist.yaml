# Watchlist: wat tracken we voor prijs-trends?
#
# pokemon_sets:
#   Pokemon TCG API set-IDs die we volgen voor losse-kaart prijzen
#   (Cardmarket trendPrice + averageSellPrice).
#   Laat 'ids' leeg om automatisch de laatste N sets uit de API te pakken.
#
# sealed_products:
#   Specifieke product-URLs. Voor elke URL pakt het script de meest
#   waarschijnlijke "hoofdprijs" en houdt die over tijd bij.
#     type: retail      -> normale webshop product
#     type: secondhand  -> Marktplaats / Vinted zoekpagina (laagste prijs)

pokemon_sets:
  latest_n: 5             # automatisch top-5 nieuwste sets pakken
  ids: []                 # of expliciet: ["sv8pt5", "sv9", "sv10"]


# Bronnen voor de card tracker.
#
# monitor: true   -> page snapshot + diff in dashboard
# monitor: false  -> alleen als snelkoppeling (klik-link) in dashboard.
#                    Gebruik voor Cloudflare-zware shops zoals Bol/MediaMarkt
#                    die GitHub Actions IPs hard blokkeren.

shops:
  # ===== Maastricht / dichtbij =====
  - name: "Weebs 'R Us (Maastricht)"
    region: maastricht
    games: [pokemon, onepiece]
    monitor: true
    notes: "Anime/TCG winkel in centrum Maastricht."
    urls:
      - "https://weebsrus.com/"
      - "https://weebsrus.nl/"

  - name: "Intertoys"
    region: maastricht
    games: [pokemon]
    monitor: false
    notes: "Cloudflare-zwaar; klik-link i.p.v. monitoren."
    urls:
      - "https://www.intertoys.nl/zoeken?q=pokemon+booster"
      - "https://www.intertoys.nl/zoeken?q=pokemon+elite+trainer"

  - name: "MediaMarkt"
    region: maastricht
    games: [pokemon, onepiece]
    monitor: false
    notes: "Cloudflare bot management; klik-link i.p.v. monitoren."
    urls:
      - "https://www.mediamarkt.nl/nl/category/pokemon-kaarten-2071.html"
      - "https://www.mediamarkt.nl/nl/search.html?query=one+piece+card+game"

  # ===== Landelijke NL TCG specialisten (meestal scraperbaar) =====
  - name: "CatchYourCards"
    region: nl-online
    games: [pokemon, onepiece]
    monitor: true
    urls:
      - "https://catchyourcards.nl/pokemon/"
      - "https://catchyourcards.nl/pokemon/booster-packs/"
      - "https://catchyourcards.nl/pokemon/booster-bundle/"
      - "https://catchyourcards.nl/onepiece/"

  - name: "TCG Company"
    region: nl-online
    games: [pokemon, onepiece]
    monitor: true
    urls:
      - "https://tcgcompany.nl/pokemon-booster-box/"
      - "https://tcgcompany.nl/one-piece/"

  - name: "De Broergrot"
    region: nl-online
    games: [pokemon]
    monitor: true
    urls:
      - "https://www.debroergrot.nl/"

  - name: "TCG Cards"
    region: nl-online
    games: [pokemon, onepiece]
    monitor: true
    urls:
      - "https://www.tcg-cards.nl/"

  - name: "BES Cards"
    region: nl-online
    games: [pokemon]
    monitor: true
    urls:
      - "https://www.bescards.com/pokemon-booster-box/"

  - name: "PKM Winkel"
    region: nl-online
    games: [pokemon]
    monitor: true
    urls:
      - "https://www.pkmwinkel.nl/collections/booster-box"

  - name: "TCG Reus"
    region: nl-online
    games: [pokemon, onepiece]
    monitor: true
    urls:
      - "https://www.tcgreus.nl/"

  - name: "TCG Japan"
    region: nl-online
    games: [pokemon]
    monitor: true
    notes: "Japanse Pokemon boosters en sealed product."
    urls:
      - "https://tcgjapan.nl/nl/"

  # ===== Cloudflare-zwaar; alleen als snelle link =====
  - name: "Pokemoncenter.com (NL)"
    region: nl-online
    games: [pokemon]
    monitor: false
    urls:
      - "https://www.pokemoncenter.com/nl/category/booster-packs"

  - name: "Bol.com"
    region: nl-online
    games: [pokemon, onepiece]
    monitor: false
    urls:
      - "https://www.bol.com/nl/nl/s/?searchtext=pokemon+booster+box"
      - "https://www.bol.com/nl/nl/s/?searchtext=one+piece+card+game+booster"
